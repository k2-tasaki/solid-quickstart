<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>🦔 ハリネズミバトル</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
html, body { width:100%; height:100%; overflow:hidden; background:#0a1a0a; font-family:'Hiragino Kaku Gothic ProN','Yu Gothic',sans-serif; }
canvas { position:fixed; top:0; left:0; touch-action:none; }

.screen {
  position:fixed; inset:0; z-index:50;
  display:flex; flex-direction:column; align-items:center; justify-content:center;
  background:radial-gradient(ellipse at 50% 40%, #162816 0%, #080f08 100%);
  padding:20px;
}
.screen.off { display:none; }

.logo { font-size:clamp(2.2rem,8vw,3.8rem); font-weight:900; color:#fff;
  text-shadow:0 0 20px #6f6,0 0 50px #3a3; letter-spacing:.04em;
  animation:glow 2.5s ease-in-out infinite; margin-bottom:.15em; }
.tagline { color:#7c7; font-size:clamp(.8rem,3vw,1rem); margin-bottom:2em; letter-spacing:.08em; }
@keyframes glow { 0%,100%{text-shadow:0 0 20px #6f6,0 0 50px #3a3} 50%{text-shadow:0 0 35px #9f9,0 0 80px #5c5} }

.btn {
  display:block; width:min(280px,85vw); padding:.85em 1.5em; margin:.4em auto;
  font-size:clamp(1rem,4vw,1.25rem); font-weight:700; border-radius:50px; border:none; cursor:pointer;
  transition:transform .12s, box-shadow .12s; letter-spacing:.04em;
}
.btn:active { transform:scale(.93); }
.btn-green { background:linear-gradient(135deg,#3a7a3a,#5aaa5a); color:#fff; box-shadow:0 4px 18px rgba(80,180,80,.45); }
.btn-blue  { background:linear-gradient(135deg,#2a4a7a,#4a7aaa); color:#fff; box-shadow:0 4px 18px rgba(80,130,220,.4); }
.btn-gray  { background:linear-gradient(135deg,#333,#555); color:#ccc; box-shadow:0 2px 10px rgba(0,0,0,.4); font-size:clamp(.85rem,3vw,1rem); }

.panel { background:rgba(255,255,255,.06); border:1px solid rgba(255,255,255,.12); border-radius:16px; padding:20px 24px; margin:12px 0; width:min(320px,90vw); text-align:center; }
.qr-box { background:#fff; border-radius:12px; padding:12px; display:inline-block; margin:8px 0; }
.room-id { font-size:clamp(2rem,8vw,2.8rem); font-weight:900; letter-spacing:.18em; color:#6f6; margin:6px 0; }
.hint { color:#8a8; font-size:.82rem; line-height:1.5; }
.status-msg { color:#aaa; font-size:.9rem; margin:.5em 0; min-height:1.4em; text-align:center; }
.status-msg.ok  { color:#6f6; }
.status-msg.err { color:#f66; }

.room-input {
  background:rgba(255,255,255,.1); border:2px solid #5a9a5a; border-radius:10px;
  color:#fff; font-size:1.6rem; font-weight:700; letter-spacing:.2em;
  padding:.4em .6em; width:min(200px,70vw); text-align:center; outline:none; margin:.5em 0;
}
.room-input:focus { border-color:#9f9; box-shadow:0 0 0 3px rgba(100,220,100,.25); }

#scoreBar {
  position:fixed; top:0; left:0; right:0; z-index:30;
  display:flex; align-items:center; justify-content:space-between;
  padding:6px 16px; background:rgba(0,0,0,.65); backdrop-filter:blur(8px);
}
#scoreBar.off { display:none; }
.sb-player { display:flex; align-items:center; gap:8px; font-weight:700; font-size:clamp(.85rem,3vw,1.1rem); color:#fff; }
.sb-score { font-size:clamp(1.6rem,5vw,2rem); font-weight:900; }
.c1 { color:#ffa040; } .c2 { color:#40aaff; }
.sb-mid { color:#666; font-size:.75rem; text-align:center; }

#overlay {
  position:fixed; inset:0; z-index:40;
  display:flex; flex-direction:column; align-items:center; justify-content:center;
  background:rgba(0,0,0,.72); color:#fff;
  font-size:clamp(1.6rem,6vw,3rem); font-weight:900; text-align:center; padding:20px;
  animation:pop .3s ease;
}
#overlay.off { display:none; }
@keyframes pop { from{opacity:0;transform:scale(.75)} to{opacity:1;transform:scale(1)} }
#overlay .sub { font-size:.42em; color:#aaa; margin-top:.4em; font-weight:400; }
#overlay .cnt { font-size:clamp(3rem,10vw,5rem); color:#6f6; text-shadow:0 0 20px #6f6; margin-top:.2em; }

.joy-zone {
  position:fixed; bottom:18px; z-index:35;
  width:min(155px,32vw); height:min(155px,32vw);
  border-radius:50%; display:flex; align-items:center; justify-content:center; touch-action:none;
}
#joyL { left:50%; transform:translateX(-50%); background:rgba(255,160,64,.08); border:2px solid rgba(255,160,64,.22); }
#joyR { right:18px; background:rgba(64,170,255,.08); border:2px solid rgba(64,170,255,.22); }
.joy-zone.off { display:none; }
.joy-knob {
  width:44%; height:44%; border-radius:50%; pointer-events:none;
  transition:transform .04s;
}
#joyLK { background:radial-gradient(circle at 35% 35%,rgba(255,200,120,.75),rgba(255,200,120,.2)); }
#joyRK { background:radial-gradient(circle at 35% 35%,rgba(100,180,255,.75),rgba(100,180,255,.2)); }

#backBtn {
  position:fixed; top:50px; left:12px; z-index:35;
  background:rgba(0,0,0,.5); border:1px solid rgba(255,255,255,.2);
  color:#aaa; border-radius:8px; padding:6px 14px; font-size:.85rem; cursor:pointer; display:none;
}
#backBtn.show { display:block; }

#credit {
  position:fixed; bottom:8px; right:12px; z-index:60;
  color:rgba(255,255,255,.2); font-size:.68rem; font-family:'Courier New',monospace; letter-spacing:.12em; pointer-events:none;
}
#credit span { color:rgba(140,255,140,.38); font-weight:bold; }
</style>
</head>
<body>

<canvas id="c"></canvas>

<!-- MENU -->
<div class="screen" id="sMenu">
  <div class="logo">🦔 ハリネズミバトル</div>
  <div class="tagline">針でつついて相手を台から落とせ！</div>
  <button class="btn btn-green" onclick="goHost()">🏠 ホストになる（QR表示）</button>
  <button class="btn btn-blue"  onclick="goJoin()">📱 参加する（QRスキャン後）</button>
  <button class="btn btn-gray"  onclick="startSolo()">👥 同じ画面で2人対戦</button>
</div>

<!-- HOST -->
<div class="screen off" id="sHost">
  <div class="logo" style="font-size:1.5rem">📡 ホスト画面</div>
  <div class="panel">
    <div class="hint">相手にQRをスキャンしてもらうか<br>ルームIDを直接伝えてください</div>
    <div class="qr-box"><img id="qrImg" width="180" height="180" alt="QR生成中…"></div>
    <div class="room-id" id="roomIdDisp">------</div>
    <div class="hint">↑このIDを相手に伝えてもOK</div>
  </div>
  <div class="status-msg" id="hostMsg">⏳ サーバーに接続中…</div>
  <button class="btn btn-gray" style="width:150px;margin-top:.5em" onclick="goMenu()">← 戻る</button>
</div>

<!-- JOIN -->
<div class="screen off" id="sJoin">
  <div class="logo" style="font-size:1.5rem">🎮 ゲームに参加</div>
  <div class="panel">
    <div class="hint">ホストのルームID（6桁）を入力</div>
    <input class="room-input" id="joinInput" type="text" inputmode="numeric" placeholder="000000" maxlength="6">
  </div>
  <button class="btn btn-green" onclick="doJoin()">接続する 🚀</button>
  <div class="status-msg" id="joinMsg"></div>
  <button class="btn btn-gray" style="width:150px;margin-top:.5em" onclick="goMenu()">← 戻る</button>
</div>

<!-- SCORE BAR -->
<div id="scoreBar" class="off">
  <div class="sb-player c1">🦔 P1&nbsp;<span class="sb-score" id="sc1">0</span></div>
  <div class="sb-mid">先取<br>3勝</div>
  <div class="sb-player c2"><span class="sb-score" id="sc2">0</span>&nbsp;P2 🦔</div>
</div>

<!-- JOYSTICKS -->
<div class="joy-zone off" id="joyL"><div class="joy-knob" id="joyLK"></div></div>
<div class="joy-zone off" id="joyR"><div class="joy-knob" id="joyRK"></div></div>

<!-- OVERLAY -->
<div id="overlay" class="off">
  <div id="ovText"></div>
  <div class="sub" id="ovSub"></div>
  <div class="cnt" id="ovCnt"></div>
</div>

<button id="backBtn" onclick="goMenu()">← メニュー</button>
<div id="credit">created by <span>YUGA</span></div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/peerjs/1.5.2/peerjs.min.js"></script>
<script>
// ══════════════════════════════════════════
//  CONFIG
// ══════════════════════════════════════════
const WIN_ROUNDS = 3;
const FRICTION   = 0.86;
const MOVE_F     = 0.32;
const BOUNCE_F   = 4.4;
const PEER_CFG   = { config:{ iceServers:[
  {urls:'stun:stun.l.google.com:19302'},
  {urls:'stun:stun1.l.google.com:19302'},
  {urls:'stun:stun.cloudflare.com:3478'}
]}};

// ══════════════════════════════════════════
//  CANVAS
// ══════════════════════════════════════════
const cv  = document.getElementById('c');
const ctx = cv.getContext('2d');
let W, H, CX, CY, PR, PSZ, frameN = 0;
let stars = [], grasses = [];

function resize() {
  W = cv.width  = window.innerWidth;
  H = cv.height = window.innerHeight;
  CX = W/2; CY = H/2 + 18;
  PR  = Math.min(W,H)*0.285;
  PSZ = Math.min(W,H)*0.052;
  buildBg();
}
function buildBg() {
  stars = Array.from({length:70}, () => ({
    x:Math.random()*W, y:Math.random()*H,
    r:Math.random()*1.4+.3, b:Math.random()*Math.PI*2
  }));
  grasses = Array.from({length:22}, (_,i)=>{
    const a=(i/22)*Math.PI*2;
    return {x:CX+Math.cos(a)*(PR+Math.random()*26+8),
            y:CY+Math.sin(a)*(PR+Math.random()*26+8),
            h:Math.random()*9+5, a};
  });
}
window.addEventListener('resize', resize);
resize();

// ══════════════════════════════════════════
//  STATE
// ══════════════════════════════════════════
let mode    = 'menu';
let isHost  = false;
let peer    = null, conn = null;
let score1  = 0, score2 = 0;
let particles = [];
let roundLock = false;
let p1 = {}, p2 = {};

// joystick state objects
const jL = {dx:0,dy:0,ox:0,oy:0,id:-1};  // P1 / online player
const jR = {dx:0,dy:0,ox:0,oy:0,id:-1};  // P2 (solo only)

// keyboard
const K = {};
document.addEventListener('keydown', e => K[e.code]=true);
document.addEventListener('keyup',   e => K[e.code]=false);

// ══════════════════════════════════════════
//  PLAYER FACTORY
// ══════════════════════════════════════════
function mkP(x,y,angle){ return {x,y,vx:0,vy:0,angle,alive:true,falling:false,fallSc:1,_dx:0,_dy:0}; }
function resetPlayers(){
  p1 = mkP(CX-PR*.5, CY, 0);
  p2 = mkP(CX+PR*.5, CY, Math.PI);
  particles=[];
  roundLock=false;
}

// ══════════════════════════════════════════
//  UI HELPERS
// ══════════════════════════════════════════
function showScreen(id){
  ['sMenu','sHost','sJoin'].forEach(s=>document.getElementById(s).classList.toggle('off',s!==id));
}
function hideScreens(){
  ['sMenu','sHost','sJoin'].forEach(s=>document.getElementById(s).classList.add('off'));
}
function setOv(text,sub,cnt){
  document.getElementById('ovText').textContent = text||'';
  document.getElementById('ovSub').textContent  = sub||'';
  document.getElementById('ovCnt').textContent  = cnt||'';
  document.getElementById('overlay').classList.toggle('off',!text&&!cnt);
}
function hideOv(){ document.getElementById('overlay').classList.add('off'); }
function showBar(v){ document.getElementById('scoreBar').classList.toggle('off',!v); }
function showJoyL(v){ document.getElementById('joyL').classList.toggle('off',!v); }
function showJoyR(v){ document.getElementById('joyR').classList.toggle('off',!v); }
function showBack(v){ document.getElementById('backBtn').classList.toggle('show',v); }
function updScore(){ document.getElementById('sc1').textContent=score1; document.getElementById('sc2').textContent=score2; }

// ══════════════════════════════════════════
//  NAVIGATION
// ══════════════════════════════════════════
function goMenu(){
  destroyPeer();
  mode='menu'; score1=score2=0;
  showScreen('sMenu');
  showBar(false); showJoyL(false); showJoyR(false); showBack(false); hideOv();
}

// ── HOST ──────────────────────────────────
function goHost(){
  showScreen('sHost');
  setHostMsg('⏳ サーバーに接続中…','');
  document.getElementById('roomIdDisp').textContent='------';
  document.getElementById('qrImg').src='';

  const rid = String(Math.floor(100000+Math.random()*900000));
  peer = new Peer(rid, PEER_CFG);

  peer.on('open', id=>{
    document.getElementById('roomIdDisp').textContent=id;
    setHostMsg('⏳ 相手を待っています…','');
    const url=location.href.replace(/#.*/,'')+encodeURIComponent('#'+id);
    const qr=`https://api.qrserver.com/v1/create-qr-code/?size=180x180&margin=8&data=${url}`;
    const img=document.getElementById('qrImg');
    img.src=qr; img.alt='QRコード';
    img.onerror=()=>{img.alt='QR生成失敗 (ID直接入力可)';};
  });

  peer.on('connection', c=>{
    conn=c; wireConn(true);
    setHostMsg('✅ 接続完了！ゲーム開始！','ok');
    setTimeout(()=>startGame(true),700);
  });

  peer.on('error', e=>{
    setHostMsg('❌ '+(e.message||e.type),'err');
  });
}
function setHostMsg(t,cls){
  const el=document.getElementById('hostMsg');
  el.textContent=t; el.className='status-msg'+(cls?' '+cls:'');
}

// ── JOIN ──────────────────────────────────
function goJoin(){
  showScreen('sJoin');
  const h=location.hash.slice(1);
  if(/^\d{6}$/.test(h)) document.getElementById('joinInput').value=h;
  document.getElementById('joinMsg').textContent='';
}

function doJoin(){
  const id=document.getElementById('joinInput').value.trim();
  if(!/^\d{6}$/.test(id)){ setJoinMsg('6桁の数字を入力してください','err'); return; }
  setJoinMsg('⏳ 接続中…','');
  destroyPeer();

  peer = new Peer(PEER_CFG);  // guest gets random ID

  peer.on('open',()=>{
    conn = peer.connect(id,{reliable:true});

    conn.on('open',()=>{
      setJoinMsg('✅ 接続完了！','ok');
      wireConn(false);
      // ★ KEY FIX: start game on guest side too
      setTimeout(()=>startGame(false),700);
    });

    conn.on('error', e=>setJoinMsg('❌ '+(e.message||e.type),'err'));
  });

  peer.on('error', e=>{
    const msg=e.type==='peer-unavailable'?'ルームが見つかりません':(e.message||e.type);
    setJoinMsg('❌ '+msg,'err');
  });
}
function setJoinMsg(t,cls){
  const el=document.getElementById('joinMsg');
  el.textContent=t; el.className='status-msg'+(cls?' '+cls:'');
}

// ── SOLO ─────────────────────────────────
function startSolo(){
  mode='solo'; score1=score2=0;
  launchGame();
}

// ══════════════════════════════════════════
//  PEER WIRE
// ══════════════════════════════════════════
function wireConn(host){
  isHost=host;
  conn.on('data', onData);
  conn.on('close',()=>{
    if(mode==='playing'){
      setOv('😢 相手が切断しました','メニューに戻ります','');
      setTimeout(goMenu,2500);
    }
  });
  conn.on('error', e=>console.warn('conn',e));
}

function sendNet(d){
  if(conn&&conn.open){ try{conn.send(d);}catch(_){} }
}

function onData(d){
  if(!d) return;
  if(isHost){
    if(d.t==='i'){ p2._dx=d.x||0; p2._dy=d.y||0; }
  } else {
    if(d.t==='s'){
      Object.assign(p1,d.p1); Object.assign(p2,d.p2);
      score1=d.s1; score2=d.s2; updScore();
      if(d.ov) setOv(d.ov,d.ovs||'',d.ovc||''); else hideOv();
    }
  }
}

function destroyPeer(){
  if(conn){try{conn.close();}catch(_){} conn=null;}
  if(peer){try{peer.destroy();}catch(_){} peer=null;}
}

// ══════════════════════════════════════════
//  GAME LAUNCH
// ══════════════════════════════════════════
function startGame(host){
  isHost=host; mode='playing'; score1=score2=0;
  launchGame();
}

function launchGame(){
  resize(); resetPlayers(); updScore();
  hideScreens(); showBar(true); showBack(true); hideOv();
  showJoyL(true);
  showJoyR(mode==='solo');
  setupTouches();
  // start loop (it's already running via rAF, just needed mode change)
}

// ══════════════════════════════════════════
//  MAIN LOOP
// ══════════════════════════════════════════
(function mainLoop(){
  requestAnimationFrame(mainLoop);
  frameN++;

  if(mode==='menu'){
    idleDraw(); return;
  }

  readKeyboard();

  if(isHost || mode==='solo'){
    physics();
    collision();
    fallCheck();
  }

  updateParticles();
  renderGame();

  if(isHost){
    sendNet({
      t:'s',
      p1:{x:p1.x,y:p1.y,vx:p1.vx,vy:p1.vy,angle:p1.angle,alive:p1.alive,falling:p1.falling,fallSc:p1.fallSc},
      p2:{x:p2.x,y:p2.y,vx:p2.vx,vy:p2.vy,angle:p2.angle,alive:p2.alive,falling:p2.falling,fallSc:p2.fallSc},
      s1:score1, s2:score2,
      ov:  document.getElementById('ovText').textContent||'',
      ovs: document.getElementById('ovSub').textContent||'',
      ovc: document.getElementById('ovCnt').textContent||''
    });
  } else if(mode==='playing'){
    sendNet({t:'i', x:jL.dx, y:jL.dy});
  }
}());

// ══════════════════════════════════════════
//  INPUT
// ══════════════════════════════════════════
function readKeyboard(){
  // P1 / online: WASD or Arrows
  let x1=0,y1=0;
  if(K.ArrowLeft||K.KeyA) x1-=1;
  if(K.ArrowRight||K.KeyD) x1+=1;
  if(K.ArrowUp||K.KeyW)   y1-=1;
  if(K.ArrowDown||K.KeyS) y1+=1;
  const l1=Math.hypot(x1,y1); if(l1>1){x1/=l1;y1/=l1;}
  if(l1>0){jL.dx=x1;jL.dy=y1;}

  // P2 solo: IJKL
  if(mode==='solo'){
    let x2=0,y2=0;
    if(K.KeyJ) x2-=1; if(K.KeyL) x2+=1;
    if(K.KeyI) y2-=1; if(K.KeyK) y2+=1;
    const l2=Math.hypot(x2,y2); if(l2>1){x2/=l2;y2/=l2;}
    if(l2>0){jR.dx=x2;jR.dy=y2;}
  }
}

// ══════════════════════════════════════════
//  PHYSICS
// ══════════════════════════════════════════
function applyMove(p,dx,dy){
  if(!p.alive||p.falling) return;
  p.vx+=dx*MOVE_F; p.vy+=dy*MOVE_F;
  if(Math.abs(dx)>.04||Math.abs(dy)>.04) p.angle=Math.atan2(dy,dx);
}

function physics(){
  const p2dx = mode==='solo' ? jR.dx : (p2._dx||0);
  const p2dy = mode==='solo' ? jR.dy : (p2._dy||0);
  applyMove(p1, jL.dx, jL.dy);
  applyMove(p2, p2dx,  p2dy);
  for(const p of [p1,p2]){
    p.vx*=FRICTION; p.vy*=FRICTION;
    if(!p.falling){ p.x+=p.vx; p.y+=p.vy; }
    else { p.vy+=0.3; p.y+=p.vy; p.fallSc=Math.max(.04,p.fallSc-.045); }
  }
}

function collision(){
  if(!p1.alive||!p2.alive||p1.falling||p2.falling) return;
  const dx=p2.x-p1.x, dy=p2.y-p1.y;
  const dist=Math.hypot(dx,dy), min=PSZ*2;
  if(dist<min&&dist>.1){
    const nx=dx/dist, ny=dy/dist, ov=(min-dist)*.5;
    p1.x-=nx*ov; p1.y-=ny*ov;
    p2.x+=nx*ov; p2.y+=ny*ov;
    p1.vx-=nx*BOUNCE_F; p1.vy-=ny*BOUNCE_F;
    p2.vx+=nx*BOUNCE_F; p2.vy+=ny*BOUNCE_F;
    burst((p1.x+p2.x)/2,(p1.y+p2.y)/2,15,'#ffcc44');
  }
}

function fallCheck(){
  if(roundLock) return;
  checkFall(p1,'p1'); checkFall(p2,'p2');
}

function checkFall(p,who){
  if(!p.alive||p.falling) return;
  if(Math.hypot(p.x-CX,p.y-CY)+PSZ*.4>PR){
    p.falling=true; p.vy+=2.8; roundLock=true;
    setTimeout(()=>{
      p.alive=false;
      if(who==='p1'){ score2++; burst(CX,CY,36,'#40aaff'); endRound('P2 の勝ち！ 🦔'); }
      else           { score1++; burst(CX,CY,36,'#ffa040'); endRound('P1 の勝ち！ 🦔'); }
    },780);
  }
}

function endRound(text){
  updScore();
  if(score1>=WIN_ROUNDS||score2>=WIN_ROUNDS){
    const w=score1>=WIN_ROUNDS?'P1':'P2';
    setOv(`🏆 ${w} の優勝！`,'お疲れ様でした！','');
    setTimeout(goMenu,3500);
    return;
  }
  let n=3;
  const tick=()=>{
    if(n<=0){ hideOv(); resetPlayers(); return; }
    setOv(text,'次のラウンドまで…',String(n--));
    setTimeout(tick,1000);
  };
  setOv(text,'','');
  setTimeout(tick,900);
}

// ══════════════════════════════════════════
//  PARTICLES
// ══════════════════════════════════════════
function burst(x,y,n,col){
  for(let i=0;i<n;i++){
    const a=Math.random()*Math.PI*2,s=Math.random()*4+1;
    particles.push({x,y,vx:Math.cos(a)*s,vy:Math.sin(a)*s,life:1,r:Math.random()*4+2,col});
  }
}
function updateParticles(){
  for(let i=particles.length-1;i>=0;i--){
    const p=particles[i];
    p.x+=p.vx; p.y+=p.vy; p.vy+=.1;
    p.vx*=.94; p.vy*=.94; p.life-=.033;
    if(p.life<=0) particles.splice(i,1);
  }
}

// ══════════════════════════════════════════
//  RENDER
// ══════════════════════════════════════════
function drawSky(){
  const g=ctx.createRadialGradient(CX,CY*.55,0,CX,CY,Math.max(W,H)*.88);
  g.addColorStop(0,'#1a2e1a'); g.addColorStop(1,'#070d07');
  ctx.fillStyle=g; ctx.fillRect(0,0,W,H);
  for(const s of stars){
    const a=.35+.3*Math.sin(s.b+frameN*.018);
    ctx.beginPath(); ctx.arc(s.x,s.y,s.r,0,Math.PI*2);
    ctx.fillStyle=`rgba(255,255,255,${a})`; ctx.fill();
  }
}

function drawPlatform(){
  ctx.save();
  ctx.shadowColor='rgba(0,0,0,.5)'; ctx.shadowBlur=28; ctx.shadowOffsetY=12;
  ctx.beginPath(); ctx.arc(CX,CY,PR,0,Math.PI*2); ctx.fillStyle='#1a0d05'; ctx.fill();
  ctx.restore();

  const pg=ctx.createRadialGradient(CX-PR*.18,CY-PR*.14,0,CX,CY,PR);
  pg.addColorStop(0,'#5a8838'); pg.addColorStop(.65,'#4a7828'); pg.addColorStop(1,'#3a5818');
  ctx.beginPath(); ctx.arc(CX,CY,PR,0,Math.PI*2); ctx.fillStyle=pg; ctx.fill();

  const dg=ctx.createRadialGradient(CX,CY,0,CX,CY,PR*.4);
  dg.addColorStop(0,'#8a6838'); dg.addColorStop(1,'#6a4828');
  ctx.beginPath(); ctx.arc(CX,CY,PR*.41,0,Math.PI*2); ctx.fillStyle=dg; ctx.fill();

  ctx.beginPath(); ctx.arc(CX,CY,PR,0,Math.PI*2);
  ctx.strokeStyle='#68bf28'; ctx.lineWidth=7; ctx.stroke();
  ctx.strokeStyle='rgba(100,200,40,.25)'; ctx.lineWidth=14; ctx.stroke();

  ctx.beginPath(); ctx.arc(CX,CY,PR*.07,0,Math.PI*2);
  ctx.strokeStyle='rgba(255,255,255,.16)'; ctx.lineWidth=2; ctx.stroke();

  for(const g of grasses){
    ctx.save(); ctx.translate(g.x,g.y); ctx.rotate(g.a+Math.PI*.5);
    ctx.beginPath(); ctx.moveTo(-2.5,0);
    ctx.quadraticCurveTo(-1,-g.h,0,-g.h*1.2);
    ctx.quadraticCurveTo(1,-g.h,2.5,0);
    ctx.fillStyle='#58bf18'; ctx.fill(); ctx.restore();
  }
}

function renderGame(){
  ctx.clearRect(0,0,W,H);
  drawSky(); drawPlatform();
  for(const p of particles){
    ctx.save(); ctx.globalAlpha=p.life;
    ctx.beginPath(); ctx.arc(p.x,p.y,p.r*p.life,0,Math.PI*2);
    ctx.fillStyle=p.col; ctx.fill(); ctx.restore();
  }
  if(p1.alive||p1.falling) drawHog(p1,'#e8a060','#9a5020','#f0c080',1);
  if(p2.alive||p2.falling) drawHog(p2,'#c8c8e8','#6868a0','#e8e8ff',2);
}

function drawHog(p,c1,c2,belly,pid){
  ctx.save();
  ctx.translate(p.x,p.y);
  const sc=p.falling?p.fallSc:1;
  ctx.scale(sc,sc);
  if(p.falling) ctx.rotate(frameN*.17);

  const sz=PSZ, fd=p.angle;

  // body
  const bg=ctx.createRadialGradient(-sz*.2,-sz*.25,0,0,0,sz);
  bg.addColorStop(0,c1); bg.addColorStop(1,c2);
  ctx.beginPath(); ctx.arc(0,0,sz,0,Math.PI*2); ctx.fillStyle=bg; ctx.fill();

  // spikes
  const SC=18, spread=Math.PI*1.32;
  const sA=fd+Math.PI-spread*.5, wag=Math.sin(frameN*.14)*.06;
  for(let i=0;i<SC;i++){
    const t=i/(SC-1), a=sA+spread*t+wag;
    const len=sz*(.56+.18*Math.sin(t*Math.PI)), ir=sz*.83;
    ctx.beginPath();
    ctx.moveTo(Math.cos(a-.11)*ir,Math.sin(a-.11)*ir);
    ctx.lineTo(Math.cos(a)*(ir+len),Math.sin(a)*(ir+len));
    ctx.lineTo(Math.cos(a+.11)*ir,Math.sin(a+.11)*ir);
    ctx.fillStyle='#1a0d06'; ctx.fill();
  }

  // redraw body over spike bases
  ctx.beginPath(); ctx.arc(0,0,sz*.83,0,Math.PI*2); ctx.fillStyle=bg; ctx.fill();

  // belly
  ctx.beginPath();
  ctx.ellipse(Math.cos(fd)*sz*.18,Math.sin(fd)*sz*.18,sz*.43,sz*.36,fd,0,Math.PI*2);
  ctx.fillStyle=belly; ctx.fill();

  // face
  const f2=sz*.4, fx=Math.cos(fd)*f2, fy=Math.sin(fd)*f2;
  const px=-Math.sin(fd), py=Math.cos(fd);
  const eR=sz*.122, eOff=sz*.165;

  for(const s of [-1,1]){
    const ex=fx+px*eOff*s, ey=fy+py*eOff*s;
    ctx.beginPath(); ctx.arc(ex,ey,eR,0,Math.PI*2); ctx.fillStyle='#fff'; ctx.fill();
    ctx.beginPath(); ctx.arc(ex+Math.cos(fd)*eR*.28,ey+Math.sin(fd)*eR*.28,eR*.54,0,Math.PI*2); ctx.fillStyle='#111'; ctx.fill();
    ctx.beginPath(); ctx.arc(ex-eR*.16,ey-eR*.16,eR*.23,0,Math.PI*2); ctx.fillStyle='#fff'; ctx.fill();
    ctx.beginPath(); ctx.arc(ex,ey,eR*1.08,fd-Math.PI*.76,fd-Math.PI*.24);
    ctx.strokeStyle='#444'; ctx.lineWidth=1.3; ctx.stroke();
  }

  // nose
  ctx.beginPath();
  ctx.ellipse(fx+Math.cos(fd)*sz*.1,fy+Math.sin(fd)*sz*.1,sz*.092,sz*.064,fd,0,Math.PI*2);
  ctx.fillStyle=pid===1?'#cc6644':'#7878aa'; ctx.fill();

  // smile
  ctx.beginPath();
  ctx.arc(fx+Math.cos(fd)*sz*.22,fy+Math.sin(fd)*sz*.22,sz*.11,fd+.38,fd+Math.PI-.38);
  ctx.strokeStyle='#8b4513'; ctx.lineWidth=1.8; ctx.stroke();

  // badge
  const bx=-Math.cos(fd)*sz*.52, by=-Math.sin(fd)*sz*.52;
  ctx.beginPath(); ctx.arc(bx,by,sz*.23,0,Math.PI*2);
  ctx.fillStyle=pid===1?'#ffa040':'#40aaff'; ctx.fill();
  ctx.fillStyle='#fff'; ctx.font=`bold ${sz*.19}px sans-serif`;
  ctx.textAlign='center'; ctx.textBaseline='middle';
  ctx.fillText('P'+pid,bx,by);

  ctx.restore();
}

function idleDraw(){
  ctx.clearRect(0,0,W,H);
  drawSky(); drawPlatform();
  const t=frameN*.022;
  drawHog({x:CX+Math.cos(t)*PR*.42,y:CY+Math.sin(t)*PR*.28,angle:t+Math.PI*.5,alive:true,falling:false,fallSc:1},'#e8a060','#9a5020','#f0c080',1);
  drawHog({x:CX+Math.cos(t+Math.PI)*PR*.42,y:CY+Math.sin(t+Math.PI)*PR*.28,angle:t+Math.PI*1.5,alive:true,falling:false,fallSc:1},'#c8c8e8','#6868a0','#e8e8ff',2);
}

// ══════════════════════════════════════════
//  TOUCH JOYSTICKS
// ══════════════════════════════════════════
function setupTouches(){
  // Left joystick (P1 / online)
  setupJoy('joyL','joyLK',jL);
  // Right joystick (P2 solo)
  if(mode==='solo') setupJoy('joyR','joyRK',jR);

  // Fallback: drag anywhere on canvas for jL (when NOT in joyR area)
  cv.addEventListener('touchstart', cvStart, {passive:true});
  cv.addEventListener('touchmove',  cvMove,  {passive:true});
  cv.addEventListener('touchend',   cvEnd,   {passive:true});
}

function setupJoy(zoneId, knobId, joyState){
  const zone = document.getElementById(zoneId);
  const knob = document.getElementById(knobId);
  const maxR = ()=> zone.offsetWidth*.34;

  function mv(cx2,cy2){
    const r=zone.getBoundingClientRect();
    const ox=cx2-(r.left+r.width/2), oy=cy2-(r.top+r.height/2);
    const d=Math.hypot(ox,oy), m=maxR();
    const ratio=Math.min(1,d/m), nx=d>0?ox/d:0, ny=d>0?oy/d:0;
    joyState.dx=nx*ratio; joyState.dy=ny*ratio;
    knob.style.transform=`translate(${nx*ratio*m}px,${ny*ratio*m}px)`;
  }
  function rel(){ joyState.dx=0;joyState.dy=0;joyState.id=-1; knob.style.transform='translate(0,0)'; }

  zone.addEventListener('touchstart',e=>{
    e.preventDefault(); e.stopPropagation();
    const t=e.changedTouches[0]; joyState.id=t.identifier; mv(t.clientX,t.clientY);
  },{passive:false});
  zone.addEventListener('touchmove',e=>{
    e.preventDefault();
    for(const t of e.changedTouches) if(t.identifier===joyState.id){ mv(t.clientX,t.clientY); break; }
  },{passive:false});
  zone.addEventListener('touchend',e=>{
    for(const t of e.changedTouches) if(t.identifier===joyState.id){ rel(); break; }
  },{passive:false});
}

// canvas-wide fallback for jL
let cvTouchId=-1;
function cvStart(e){
  const rL=document.getElementById('joyL').getBoundingClientRect();
  const rR=document.getElementById('joyR').getBoundingClientRect();
  for(const t of e.changedTouches){
    const inL=t.clientX>=rL.left&&t.clientX<=rL.right&&t.clientY>=rL.top&&t.clientY<=rL.bottom;
    const inR=t.clientX>=rR.left&&t.clientX<=rR.right&&t.clientY>=rR.top&&t.clientY<=rR.bottom;
    if(!inL&&!inR&&cvTouchId===-1){
      cvTouchId=t.identifier; jL.ox=t.clientX; jL.oy=t.clientY;
    }
  }
}
function cvMove(e){
  if(cvTouchId===-1) return;
  for(const t of e.changedTouches){
    if(t.identifier===cvTouchId){
      const ox=t.clientX-jL.ox, oy=t.clientY-jL.oy, d=Math.hypot(ox,oy), m=80;
      jL.dx=d>0?(ox/d)*Math.min(1,d/m):0; jL.dy=d>0?(oy/d)*Math.min(1,d/m):0;
    }
  }
}
function cvEnd(e){
  for(const t of e.changedTouches){
    if(t.identifier===cvTouchId){ cvTouchId=-1; jL.dx=0; jL.dy=0; }
  }
}

// ══════════════════════════════════════════
//  AUTO-JOIN FROM URL HASH
// ══════════════════════════════════════════
window.addEventListener('load',()=>{
  const h=decodeURIComponent(location.hash.slice(1));
  if(/^\d{6}$/.test(h)){
    showScreen('sJoin');
    document.getElementById('joinInput').value=h;
    document.getElementById('joinMsg').textContent='QRコードから自動入力しました！';
  }
});
